name: Deploy to AWS EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ec2-user/app

            # Pull latest code
            if [ -d .git ]; then
              git pull origin main
            else
              cd /home/ec2-user
              rm -rf app
              git clone ${{ secrets.REPO_URL }} app
              cd app
              # Restore .env from backup
              cp /home/ec2-user/.env.backup app/.env 2>/dev/null || true
            fi

            # Rebuild and restart containers
            docker-compose down
            docker-compose up --build -d
            docker-compose ps

      - name: Health check
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sleep 5
            curl -sf http://localhost:3000/api/bot/status > /dev/null && echo "Health check passed" || echo "Health check failed"
