name: Test & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: showmethemoney_test
          POSTGRES_USER: smtm
          POSTGRES_PASSWORD: smtm
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-asyncio httpx

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short
        env:
          UPBIT_ACCESS_KEY: test
          UPBIT_SECRET_KEY: test
          JWT_SECRET: test-secret-for-ci
          ENCRYPT_KEY: ""
          TEST_DATABASE_URL: postgresql://smtm:smtm@localhost:5432/showmethemoney_test
          TEST_REDIS_URL: redis://localhost:6379/1

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          source: ".,!.git,!node_modules,!venv,!data,!*.pem,!.env"
          target: /home/ec2-user/app
          overwrite: true

      - name: Build and restart containers
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ec2-user/app
            if [ ! -f .env ] && [ -f /home/ec2-user/.env.backup ]; then
              cp /home/ec2-user/.env.backup .env
            fi
            docker-compose down
            docker-compose up --build -d
            docker-compose ps

      - name: Health check
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sleep 5
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/api/version 2>/dev/null)
            if [ "$STATUS" = "200" ]; then
              echo "Deploy successful"
            else
              echo "Deploy failed (HTTP: $STATUS)"
              docker-compose -f /home/ec2-user/app/docker-compose.yml logs --tail=20
              exit 1
            fi
