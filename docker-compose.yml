services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file: .env
    volumes:
      - ./data:/app/data
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        AUTH_USER: ${AUTH_USER:-admin}
        AUTH_PASS: ${AUTH_PASS:-changeme}
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: always
